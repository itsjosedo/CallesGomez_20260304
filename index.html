<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ejemplo de manipulacion de imagenes css">
    <meta name="keywords" content="imgen, Background, avatar, css, javaScript">
    <meta name="author" content="Miguel Alexis Alvarez Flores">
    <meta name="copyright" content="2026 JJCF">
    <title>José Douglas Calles Gómez, Manejo de imagenes con CSS y javaScript</title>
    <link rel="icon" type="image/x-icon" href="media/img/icons/favicon.ico">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/script.js"></script>

    
</head>
<body>

    <!--ETIQUETA SEMANTICA HEADER-->
    <header id="img-encabezado">
        <div id="img-avatar">
            <img src="media/img/avatar/person1.webp" id="avatar">
        </div>
    </header>

    <!--ETIQUETA SEMANTICA MAIN-->
    <main>
        <div class="map">
            <img src="media/img/campos/campo1.png" alt="campos" class="base" draggable="false" onload="baseOnLoad">
        </div>

    </main>
</body>
</html>
